name: ci

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ARTIFACT_ID: phenoml-java-sdk
  GROUP_ID: com.phenoml.maven
  MAVEN_CENTRAL_BASE: https://repo.maven.apache.org/maven2

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        id: setup-jre
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "11"
          distribution: "zulu"
          architecture: x64
          cache: gradle

      - name: Compile
        run: ./gradlew compileJava

  test:
    needs: [ compile ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        id: setup-jre
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "11"
          distribution: "zulu"
          architecture: x64
          cache: gradle

      - name: Test
        run: ./gradlew test

  release_precheck:
    needs: [ compile, test ]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_release_gate: ${{ steps.check.outputs.run_release_gate }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check whether release gate should run
        id: check
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          version=$(sed -n "s/^version[[:space:]]*=[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" build.gradle | head -n1)
          if [ -z "$version" ]; then
            echo "::error::Could not read SDK version from build.gradle."
            exit 1
          fi

          target_commit=$(git rev-parse --verify "HEAD^{commit}")
          existing_commit=$(git rev-parse -q --verify "refs/tags/${version}^{commit}" || true)
          if [ -n "$existing_commit" ] && [ "$existing_commit" != "$target_commit" ]; then
            echo "Tag $version already points at $existing_commit, not $target_commit; skipping release gate for this non-release commit."
            echo "run_release_gate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_release_gate=true" >> "$GITHUB_OUTPUT"

  release_gate:
    needs: [ compile, test, release_precheck ]
    if: github.ref == 'refs/heads/main' && needs.release_precheck.outputs.run_release_gate == 'true'
    permissions:
      contents: read
    uses: PhenoML/sdk-shared-actions/.github/workflows/sdk-release-gate.yml@1.2.0
    with:
      version-source: gradle
      version-path: build.gradle
      spec-path: src/main/resources/openapi/openapi.json

  # Isolated from publish secrets — Gradle and its plugin graph run here.
  build-artifact:
    needs: [ compile, test, release_gate ]
    if: needs.release_gate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "11"
          distribution: "zulu"
          architecture: x64
          cache: gradle

      - name: Build publishable artifacts
        run: |
          ./gradlew \
            assemble \
            generatePomFileForMavenPublication \
            generateMetadataFileForMavenPublication \
            -x signMavenPublication

      - name: Stage dist/ and generate SHA256SUMS
        env:
          VERSION: ${{ needs.release_gate.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "build/libs/${ARTIFACT_ID}-${VERSION}.jar"             dist/
          cp "build/libs/${ARTIFACT_ID}-${VERSION}-sources.jar"     dist/
          cp "build/libs/${ARTIFACT_ID}-${VERSION}-javadoc.jar"     dist/
          cp "build/publications/maven/pom-default.xml"             "dist/${ARTIFACT_ID}-${VERSION}.pom"
          if [ -f build/publications/maven/module.json ]; then
            cp build/publications/maven/module.json                 "dist/${ARTIFACT_ID}-${VERSION}.module"
          fi
          ( cd dist && sha256sum ./* > SHA256SUMS )
          echo "Staged dist/:"
          ls -la dist/

      - name: Upload bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maven-bundle
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # Holds the publish secrets. Only curl/jq/gpg from the runner image run here
  # — no Java toolchain, no Gradle, no third-party actions beyond download-artifact.
  publish:
    needs: [ release_gate, build-artifact ]
    if: needs.release_gate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: maven-production
    permissions:
      contents: read
    outputs:
      published: ${{ steps.verify.outputs.published }}
    env:
      CENTRAL_API: https://central.sonatype.com/api/v1/publisher
      VERSION: ${{ needs.release_gate.outputs.version }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_SIGNATURE_SECRET_KEY: ${{ secrets.MAVEN_SIGNATURE_SECRET_KEY }}
      MAVEN_SIGNATURE_PASSWORD:   ${{ secrets.MAVEN_SIGNATURE_PASSWORD }}

    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: maven-bundle
          path: dist

      - name: Verify SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c SHA256SUMS
          rm SHA256SUMS

      - name: Import signing key into ephemeral GNUPGHOME
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d "$RUNNER_TEMP/gnupg.XXXXXX")"
          chmod 700 "$GNUPGHOME"
          # export so the import below lands in the ephemeral home; GITHUB_ENV
          # carries it to the later signing step.
          export GNUPGHOME
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          printf '%s' "$MAVEN_SIGNATURE_SECRET_KEY" \
            | gpg --batch --pinentry-mode loopback \
                  --passphrase "$MAVEN_SIGNATURE_PASSWORD" \
                  --import

      - name: Sign artifacts and emit md5/sha1 sidecars
        run: |
          set -euo pipefail
          cd dist
          for f in *; do
            [ -f "$f" ] || continue
            gpg --batch --pinentry-mode loopback \
                --passphrase "$MAVEN_SIGNATURE_PASSWORD" \
                --detach-sign --armor \
                --output "${f}.asc" \
                "$f"
            md5sum  "$f" | awk '{print $1}' > "${f}.md5"
            sha1sum "$f" | awk '{print $1}' > "${f}.sha1"
          done

      - name: Assemble Central Portal bundle zip
        run: |
          set -euo pipefail
          GROUP_PATH="$(echo "$GROUP_ID" | tr . /)"
          DEST="bundle/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}"
          mkdir -p "$DEST"
          mv dist/* "$DEST/"
          # zip from inside bundle/ and pass the top-level dir as the path so
          # entries are flat (no leading "./") — the Portal validator expects
          # entries rooted at the group path.
          TOP_DIR="$(echo "$GROUP_PATH" | cut -d/ -f1)"
          ( cd bundle && zip -r ../bundle.zip "$TOP_DIR" )
          echo "Bundle contents:"
          unzip -l bundle.zip

      - name: Upload bundle to Central Portal
        id: upload
        run: |
          set -euo pipefail
          GROUP_PATH="$(echo "$GROUP_ID" | tr . /)"
          POM_URL="${MAVEN_CENTRAL_BASE}/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom"
          AUTH="$(printf '%s:%s' "$MAVEN_USERNAME" "$MAVEN_PASSWORD" | base64 -w 0)"
          RESPONSE_FILE="$(mktemp)"
          if ! HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' -X POST \
              -H "Authorization: Bearer ${AUTH}" \
              -F "bundle=@bundle.zip;type=application/octet-stream" \
              "${CENTRAL_API}/upload?name=${ARTIFACT_ID}-${VERSION}&publishingType=AUTOMATIC")"; then
            echo "Central Portal upload request failed." >&2
            if curl -fsI "$POM_URL" >/dev/null; then
              echo "${GROUP_ID}:${ARTIFACT_ID}:${VERSION} is already available on Maven Central; continuing to finalization."
              echo "deployment_id=already-published" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit 1
          fi
          if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
            echo "Central Portal upload failed with HTTP ${HTTP_CODE}:" >&2
            cat "$RESPONSE_FILE" >&2
            if curl -fsI "$POM_URL" >/dev/null; then
              echo "${GROUP_ID}:${ARTIFACT_ID}:${VERSION} is already available on Maven Central; continuing to finalization."
              echo "deployment_id=already-published" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit 1
          fi
          DEPLOYMENT_ID="$(tr -d '"[:space:]' < "$RESPONSE_FILE")"
          if [ -z "${DEPLOYMENT_ID}" ]; then
            echo "Empty deployment id returned from Central Portal" >&2
            exit 1
          fi
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Upload accepted; deployment id: ${DEPLOYMENT_ID}"

      - name: Poll deployment status until terminal
        env:
          DEPLOYMENT_ID: ${{ steps.upload.outputs.deployment_id }}
        run: |
          set -euo pipefail
          if [ "$DEPLOYMENT_ID" = "already-published" ]; then
            echo "Maven Central artifact was already published."
            exit 0
          fi
          AUTH="$(printf '%s:%s' "$MAVEN_USERNAME" "$MAVEN_PASSWORD" | base64 -w 0)"
          for i in $(seq 1 60); do
            BODY="$(curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer ${AUTH}" \
              "${CENTRAL_API}/status?id=${DEPLOYMENT_ID}")"
            STATE="$(echo "${BODY}" | jq -r '.deploymentState')"
            echo "[${i}] deploymentState=${STATE}"
            case "${STATE}" in
              PUBLISHED)
                echo "Maven Central publish complete for deployment ${DEPLOYMENT_ID}"
                exit 0
                ;;
              FAILED)
                echo "Maven Central publish FAILED:" >&2
                echo "${BODY}" | jq . >&2
                exit 1
                ;;
            esac
            sleep 30
          done
          GROUP_PATH="$(echo "$GROUP_ID" | tr . /)"
          POM_URL="${MAVEN_CENTRAL_BASE}/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom"
          if curl -fsI "$POM_URL" >/dev/null; then
            echo "Maven Central artifact is available despite deployment polling timeout."
            exit 0
          fi
          echo "Timed out waiting for terminal deployment state" >&2
          exit 1

      - name: Verify Maven Central artifact availability
        id: verify
        run: |
          set -euo pipefail
          GROUP_PATH="$(echo "$GROUP_ID" | tr . /)"
          POM_URL="${MAVEN_CENTRAL_BASE}/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom"
          for i in $(seq 1 12); do
            if curl -fsI "$POM_URL" >/dev/null; then
              echo "published=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Maven Central artifact is not visible yet; retrying (${i}/12)."
            sleep 10
          done
          echo "::error::${GROUP_ID}:${ARTIFACT_ID}:${VERSION} is not available on Maven Central."
          exit 1

  confirm_registry_release:
    needs: [ release_gate ]
    if: github.ref == 'refs/heads/main' && needs.release_gate.outputs.should_publish == 'false'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.verify.outputs.published }}

    steps:
      - name: Verify Maven Central artifact availability
        id: verify
        env:
          VERSION: ${{ needs.release_gate.outputs.version }}
        run: |
          set -euo pipefail
          GROUP_PATH="$(echo "$GROUP_ID" | tr . /)"
          POM_URL="${MAVEN_CENTRAL_BASE}/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom"
          for i in $(seq 1 12); do
            if curl -fsI "$POM_URL" >/dev/null; then
              echo "published=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Maven Central artifact is not visible yet; retrying (${i}/12)."
            sleep 10
          done
          echo "::error::${GROUP_ID}:${ARTIFACT_ID}:${VERSION} is not available on Maven Central."
          exit 1

  release_finalize:
    needs: [ release_gate, publish, confirm_registry_release ]
    if: always() && needs.release_gate.result == 'success' && (needs.publish.outputs.published == 'true' || needs.confirm_registry_release.outputs.published == 'true')
    permissions:
      contents: write
    uses: PhenoML/sdk-shared-actions/.github/workflows/sdk-release-finalize.yml@1.2.0
    with:
      version-tag: ${{ needs.release_gate.outputs.version_tag }}
      origin-commit: ${{ needs.release_gate.outputs.origin_commit }}
      origin-tag: ${{ needs.release_gate.outputs.origin_tag }}
